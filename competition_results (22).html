<html lang="en">

<title>GIHS Term 1 2026 Cubing Competition - Results</title>
<style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Rajdhani:wght@500;600;700&display=swap');
:root{--bg:#090b14;--surface:#111526;--surface2:#1c223b;--border:#2a314d;--accent:#3b82f6;--green:#10b981;--red:#ef4444;--gold:#fbbf24;--text:#f3f4f6;--muted:#9ca3af;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
header{display:flex;justify-content:space-between;align-items:center;padding:15px 30px;background:var(--surface);border-bottom:1px solid var(--border);}
.logo{font-size:20px;font-weight:700;letter-spacing:1px;color:#fff;display:flex;align-items:center;gap:10px;}
.logo-icon{width:30px;height:30px;background:var(--accent);border-radius:8px;display:flex;justify-content:center;align-items:center;font-weight:bold;}
button{font-family:'Inter',sans-serif;font-weight:600;padding:8px 14px;background:var(--surface2);color:var(--text);border:1px solid var(--border);cursor:pointer;border-radius:6px;transition:all 0.15s;font-size:13px;}
button:hover{background:#252d4a;border-color:var(--muted);}
.btn-warning{background:rgba(251,191,36,0.2);border-color:var(--gold);color:var(--gold);}
.btn-warning:hover{background:var(--gold);color:#000;}
.btn-mini{padding:6px 14px;font-size:12px;}
#main-body{flex:1;padding:30px;}
.section-tabs{display:flex;gap:8px;flex-wrap:wrap;}
.tab-btn{padding:8px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;}
.tab-btn:hover{border-color:var(--accent);color:#fff;}
.tab-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 0 15px rgba(59,130,246,0.4);}
.event-bar{margin-bottom:15px;}
.round-bar{margin-bottom:15px;background:var(--bg);padding:10px;border-radius:10px;border:1px solid var(--border);}
.table-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,0.3);overflow-x:auto;}
table{width:100%;border-collapse:collapse;text-align:left;min-width:700px;}
th{background:#151a2d;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:1px;padding:16px;border-bottom:1px solid var(--border);font-weight:600;}
td{padding:14px 16px;border-bottom:1px solid var(--surface2);font-size:14px;color:#e5e7eb;position:relative;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,0.02);}
.rank-col{width:50px;text-align:center;font-weight:bold;color:var(--muted);}
.rank-green{color:var(--green)!important;}
.solver-name{font-weight:600;color:#fff;cursor:pointer;transition:color 0.2s;}
.solver-name:hover{color:var(--accent);}
.solve-cell{font-family:'Rajdhani',monospace;font-size:15px;text-align:center;}
.solve-best{color:var(--green);font-weight:bold;text-shadow:0 0 10px rgba(16,185,129,0.4);}
.solve-worst{color:var(--red);opacity:0.8;}
.bubble{position:absolute;top:4px;right:4px;padding:2px 6px;border-radius:4px;font-size:9px;font-weight:bold;pointer-events:none;}
.pr-bubble{background:var(--accent);color:white;}
.sr-bubble{background:var(--green);color:#000;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:4px;}
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;justify-content:center;align-items:center;backdrop-filter:blur(5px);}
#profile-modal{background:var(--surface);width:90%;max-width:1100px;max-height:85vh;overflow-y:auto;padding:30px;border-radius:16px;border:1px solid var(--border);position:relative;box-shadow:0 25px 50px -12px rgba(0,0,0,0.7);}
#modal-content{overflow-x:auto;}
.close-modal{position:absolute;top:20px;right:25px;font-size:30px;cursor:pointer;color:var(--muted);background:transparent;border:none;padding:0;}
.close-modal:hover{color:#fff;background:transparent;}
#modal-name{color:#fff;font-size:24px;margin-bottom:20px;}
.medal{display:inline-block;padding:6px 16px;border-radius:20px;font-weight:bold;font-size:14px;}
.medal.gold{background:#ffd700;color:#000;}
.medal.silver{background:#c0c0c0;color:#000;}
.medal.bronze{background:#cd7f32;color:#000;}
.medal-box{display:flex;gap:10px;margin-bottom:20px;}</style>

        let TD='style="padding:14px 16px;border-bottom:1px solid #1c223b;';
        c+='<tr>'
         +'<td '+TD+'color:#9ca3af;font-weight:bold;">'+esc(sh.parent)+'</td>'
         +'<td '+TD+'"><span style="color:#3b82f6;cursor:pointer;" onclick="goToRound('+JSON.stringify(key).replace(/"/g,'&quot;')+')">'+esc(key.split(' - ')[1])+'</span></td>'
         +'<td '+TD+'text-align:center;'+(p.green?'color:#10b981;font-weight:bold;':'')+'">'+( idx+1)+'</td>'
         +p.solves.map(s=>{let v=parseTime(s);let ib=(v!==null&&v!==Infinity&&v===bV);let iw=(v!==null&&v===wV&&!ib);let col=ib?'color:#10b981;font-weight:bold;':(iw?'color:#ef4444;opacity:0.8;':'');return'<td '+TD+'font-family:Rajdhani,monospace;font-size:15px;text-align:center;'+col+'">'+esc(s||'—')+'</td>';}).join('')
         +'<td '+TD+'font-family:Rajdhani,monospace;font-size:15px;text-align:center;position:relative;">'+formatTime(bV)+(p.bRec?'<span class="bubble '+p.bRec.toLowerCase()+'-bubble">'+p.bRec+'</span>':'')+'</td>'
         +'<td '+TD+'font-family:Rajdhani,monospace;font-size:15px;text-align:center;position:relative;">'+formatTime(getAverage(p.solves))+(p.aRec?'<span class="bubble '+p.aRec.toLowerCase()+'-bubble">'+p.aRec+'</span>':'')+'</td>'
         +'</tr>';
      }
    });
  });
  document.getElementById('medal-container').innerHTML='<div class="medal gold">🥇 '+m.gold+'</div><div class="medal silver">🥈 '+m.silver+'</div><div class="medal bronze">🥉 '+m.bronze+'</div>';
  document.getElementById('modal-content').innerHTML=found?c+'</tbody></table>':'<div style="text-align:center;padding:40px;color:#9ca3af;">No history found.</div>';
  document.getElementById('modal-overlay').style.display='flex';
}
function showLeaderboard(){
  document.getElementById('modal-name').textContent='CHAMPIONSHIP LEADERBOARD';
  document.getElementById('medal-container').innerHTML='';
  let sol={};Object.values(state.events).forEach(sh=>{sh.rows.forEach(r=>{sol[r.name]=true;});});
  let l=Object.keys(sol).map(n=>({name:n,...getMedalCounts(n)}));
  l.sort((a,b)=>(b.gold-a.gold)||(b.silver-a.silver)||(b.bronze-a.bronze));
  let TH='style="background:#151a2d;color:#9ca3af;font-size:11px;text-transform:uppercase;letter-spacing:1px;padding:14px 16px;border-bottom:1px solid #2a314d;text-align:center;"';
  let THL='style="background:#151a2d;color:#9ca3af;font-size:11px;text-transform:uppercase;letter-spacing:1px;padding:14px 16px;border-bottom:1px solid #2a314d;"';
  let h='<table style="width:100%;border-collapse:collapse;"><thead><tr><th '+TH+'>Rank</th><th '+THL+'>Solver</th><th '+TH+'>🥇</th><th '+TH+'>🥈</th><th '+TH+'>🥉</th><th '+TH+'>Total</th></tr></thead><tbody>';
  l.forEach((s,i)=>{
    if(s.gold+s.silver+s.bronze===0)return;
    let TD='style="padding:14px 16px;border-bottom:1px solid #1c223b;';
    h+='<tr><td '+TD+'text-align:center;font-weight:bold;color:#9ca3af;">'+(i+1)+'</td>'
      +'<td '+TD+'"><span style="cursor:pointer;color:#3b82f6;font-weight:600;" onclick="showProfile('+JSON.stringify(s.name).replace(/"/g,'&quot;')+')">'+esc(s.name)+'</span></td>'
      +'<td '+TD+'text-align:center;">'+s.gold+'</td>'
      +'<td '+TD+'text-align:center;">'+s.silver+'</td>'
      +'<td '+TD+'text-align:center;">'+s.bronze+'</td>'
      +'<td '+TD+'text-align:center;font-weight:bold;">'+(s.gold+s.silver+s.bronze)+'</td></tr>';
  });
  document.getElementById('modal-content').innerHTML=h+'</tbody></table>';
  document.getElementById('modal-overlay').style.display='flex';
}
function goToRound(key){closeProfile();renderView(key);}
function closeProfile(){document.getElementById('modal-overlay').style.display='none';}
function renderView(nk){
  if(nk)activeKey=nk;
  if(!activeKey||!state.events[activeKey])activeKey=state.eventOrder[0];
  let curP=state.events[activeKey]&&state.events[activeKey].parent?state.events[activeKey].parent:activeKey;
  let eTabs=document.getElementById('event-tabs');eTabs.innerHTML='';
  state.eventOrder.forEach(e=>{let b=document.createElement('button');b.className='tab-btn'+(curP===e?' active':'');b.textContent=e;b.onclick=()=>renderView(e);eTabs.appendChild(b);});
  let rTabs=document.getElementById('round-tabs');rTabs.innerHTML='';
  let rds=Object.keys(state.events).filter(k=>state.events[k].parent===curP);
  rds.forEach(r=>{let b=document.createElement('button');b.className='tab-btn'+(activeKey===r?' active':'');b.textContent=r.split(' - ')[1];b.onclick=()=>renderView(r);rTabs.appendChild(b);});
  let cont=document.getElementById('table-container');cont.innerHTML='';
  if(!state.events[activeKey]||!state.events[activeKey].parent){cont.innerHTML='<div style="text-align:center;padding:60px 20px;color:#9ca3af;">Select a round to view results.</div>';return;}
  let rows=[...state.events[activeKey].rows].sort((a,b)=>getSortScore(a.solves)-getSortScore(b.solves));
  let t=document.createElement('table');
  t.innerHTML='<thead><tr><th class="rank-col" style="text-align:center;">#</th><th style="text-align:left;padding-left:12px;">Competitor</th><th style="width:10%;text-align:center;">S1</th><th style="width:10%;text-align:center;">S2</th><th style="width:10%;text-align:center;">S3</th><th style="width:10%;text-align:center;">S4</th><th style="width:10%;text-align:center;">S5</th><th style="width:12%;text-align:center;">Best</th><th style="width:12%;text-align:center;">Average</th></tr></thead>';
  let tb=document.createElement('tbody');
  rows.forEach((r,i)=>{
    let tp=r.solves.map(parseTime);
    let bV=tp.filter(x=>x!==null&&x!==Infinity).length>0?Math.min(...tp.filter(x=>x!==null&&x!==Infinity)):(tp.includes(Infinity)?Infinity:null);
    let wV=tp.filter(x=>x!==null).length>0?Math.max(...tp.filter(x=>x!==null)):null;
    let tr=document.createElement('tr');
    let cells='<td class="rank-col '+(r.green?'rank-green':'')+'">'+( i+1)+'</td>'
             +'<td style="text-align:left;padding-left:12px;"><span class="solver-name" onclick="showProfile('+JSON.stringify(r.name).replace(/"/g,'&quot;')+')">'+esc(r.name)+'</span></td>';
    r.solves.forEach(s=>{let p2=parseTime(s);let cls=(p2!==null&&p2!==Infinity&&p2===bV)?'solve-best solve-cell':(p2!==null&&p2===wV?'solve-worst solve-cell':'solve-cell');cells+='<td align="center" class="'+cls+'">'+esc(s||'—')+'</td>';});
    cells+='<td align="center" class="solve-cell" style="position:relative;">'+formatTime(bV)+(r.bRec?'<span class="bubble '+r.bRec.toLowerCase()+'-bubble">'+r.bRec+'</span>':'')+'</td>';
    cells+='<td align="center" class="solve-cell" style="position:relative;">'+formatTime(getAverage(r.solves))+(r.aRec?'<span class="bubble '+r.aRec.toLowerCase()+'-bubble">'+r.aRec+'</span>':'')+'</td>';
    tr.innerHTML=cells;tb.appendChild(tr);
  });
  t.appendChild(tb);cont.appendChild(t);
}
window.onload=()=>renderView();</script>
</body>
